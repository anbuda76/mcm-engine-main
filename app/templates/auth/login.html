<!DOCTYPE html>
<html lang="it" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Accedi — MCM Engine</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            accent:  '#00A896',
            surface: { 900: '#0d1117', 800: '#161b27', 700: '#1c2333' }
          },
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>

<body class="bg-surface-900 min-h-screen flex items-center justify-center font-sans antialiased">

  <div class="w-full max-w-sm px-4">

    <!-- Logo / Brand -->
    <div class="flex flex-col items-center mb-8">
      <div class="w-12 h-12 rounded-2xl bg-gradient-to-br from-accent to-[#028090] flex items-center justify-center shadow-lg shadow-accent/20 mb-4">
        <i data-lucide="brain-circuit" class="w-6 h-6 text-white"></i>
      </div>
      <h1 class="text-white font-bold text-xl tracking-tight">MCM Engine</h1>
      <p class="text-white/40 text-xs mt-0.5 tracking-widest uppercase">BHAVE Platform</p>
    </div>

    <!-- Card -->
    <div class="bg-surface-800 rounded-2xl border border-white/6 shadow-2xl p-6 space-y-5">

      <div>
        <h2 class="text-white font-semibold text-sm">Accedi al tuo account</h2>
        <p class="text-white/40 text-xs mt-0.5">Inserisci le credenziali assegnate dall'amministratore.</p>
      </div>

      {% if error %}
      <div class="flex items-center gap-2.5 text-xs text-danger/80 bg-danger/10 border border-danger/20 rounded-lg px-3 py-2.5">
        <i data-lucide="alert-circle" class="w-4 h-4 flex-shrink-0"></i>
        <span>{{ error }}</span>
      </div>
      {% endif %}

      <form method="POST" class="space-y-4">

        <div class="space-y-1.5">
          <label class="text-[11px] font-medium text-white/40 uppercase tracking-wider">Username</label>
          <div class="relative">
            <i data-lucide="user" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-white/25 pointer-events-none"></i>
            <input type="text" name="username" required autocomplete="username"
              class="w-full bg-surface-700 border border-white/8 text-white/85 rounded-xl
                     pl-9 pr-4 py-2.5 text-sm outline-none placeholder-white/20
                     focus:border-accent/50 focus:ring-2 focus:ring-accent/10 transition-all"
              placeholder="Il tuo username">
          </div>
        </div>

        <div class="space-y-1.5">
          <label class="text-[11px] font-medium text-white/40 uppercase tracking-wider">Password</label>
          <div class="relative">
            <i data-lucide="lock" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-white/25 pointer-events-none"></i>
            <input type="password" name="password" required autocomplete="current-password"
              class="w-full bg-surface-700 border border-white/8 text-white/85 rounded-xl
                     pl-9 pr-4 py-2.5 text-sm outline-none placeholder-white/20
                     focus:border-accent/50 focus:ring-2 focus:ring-accent/10 transition-all"
              placeholder="Password">
          </div>
        </div>

        <button type="submit"
          class="w-full flex items-center justify-center gap-2 px-4 py-2.5
                 bg-accent hover:bg-accent/85 active:scale-[0.98]
                 text-white font-semibold text-sm rounded-xl
                 transition-all shadow-lg shadow-accent/20">
          <i data-lucide="log-in" class="w-4 h-4"></i>
          Accedi
        </button>

      </form>
    </div>

    <!-- Footer -->
    <p class="text-center text-white/20 text-[11px] mt-6">
      MCM Engine v2.0 · BHAVE Platform
    </p>

  </div>

  <script>lucide.createIcons();</script>
</body>
</html>
